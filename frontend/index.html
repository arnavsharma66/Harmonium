<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Meta tags for SEO & verification -->
    <meta name="google-site-verification" content="8FkqAluyh1c5AC4ZkEARv3vHpYno_Fof5Kx22YtX2Ec" />
    <title>Harmonium | Your music, beautifully arranged</title>
    <meta name="description" content="A clean, Apple Music-inspired web player for your YouTube liked songs and playlists — no ads, no recommendations, no algorithm.">
    <meta name="keywords" content="music player, youtube, harmonium, apple music, web player, ad-free">
    <meta name="author" content="Harmonium">
    <meta name="robots" content="index, follow">
    <!-- Open Graph Data -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://harmonium.vercel.app">
    <meta property="og:title" content="Harmonium">
    <meta property="og:description" content="Your music, beautifully arranged. Play your YouTube playlists with zero ads or algorithms.">
    <meta property="og:image" content="https://harmonium.vercel.app/og-image.png">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:creator" content="@Harmonium">
    <meta name="twitter:site" content="@Harmonium">
    
    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1410">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="icon" href="/favicon.ico">

    <!-- Fonts: Instrument Serif, DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- Landing Page (Unauthenticated) -->
    <div id="landing-page" class="view active">
        <div class="landing-card">
            <h1 class="logo-text">Harmonium</h1>
            <p class="tagline"><i>your music, beautifully arranged.</i></p>
            <p class="subheading">Play your YouTube liked songs and playlists.<br>No ads, no recommendations, no algorithm.</p>
            <button id="btn-login" class="btn-primary">
                <!-- Multi-coloured Google G SVG -->
                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.9c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    <path fill="none" d="M0 0h48v48H0z"/>
                </svg>
                Continue with Google
            </button>
            <div class="footnote">
                No API keys · No setup · Your YouTube quota, not ours<br>
                <a href="https://harmonium.vercel.app/privacy.html">Privacy Policy</a>
            </div>
        </div>
    </div>

    <!-- App Shell (Authenticated) -->
    <div id="app-shell" class="view">
        
        <header id="topbar">
            <div class="topbar-logo">Harmonium</div>
            <div class="topbar-center">
                <div class="search-container">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search-input" placeholder="Search..." autocomplete="off">
                </div>
                <div class="filter-pills">
                    <button class="pill active" data-filter="music">Music</button>
                    <button class="pill" data-filter="all">All</button>
                </div>
            </div>
            <div class="topbar-user">
                <span id="user-name"></span>
                <img id="user-avatar" src="" alt="User Avatar" style="display:none;">
                <button id="btn-logout" class="icon-btn" title="Sign Out">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </header>

        <div class="app-body">
            <aside id="sidebar">
                <nav class="main-nav">
                    <a href="#home" class="nav-item active" data-view="home"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> Home</a>
                    <a href="#liked" class="nav-item" data-view="liked"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg> Liked Songs</a>
                    <a href="#browse" class="nav-item" data-view="browse"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg> Browse</a>
                </nav>
                <div class="divider"></div>
                <div class="playlists-header">PLAYLISTS</div>
                <div id="playlists-list" class="scrollable-nav">
                    <!-- Dynamic user playlists -->
                </div>
            </aside>
            
            <main id="content" class="scrollable">
                <!-- Dynamic main content (Home, Playlist, etc.) -->
                <div class="spinner"></div> <!-- Loading state skeleton -->
            </main>
            
            <!-- Slide-in Queue -->
            <section id="queue-panel">
                <div class="panel-header">
                    <h3>Playing Next (<span id="queue-count">0</span>)</h3>
                    <button id="btn-clear-queue">Clear</button>
                </div>
                <div id="queue-list" class="scrollable-nav">
                    <!-- Queue items -->
                </div>
            </section>
        </div>

        <!-- Slide-up Lyrics Panel -->
        <section id="lyrics-panel">
            <div class="lyrics-container">
                <!-- Synced lyrics -->
            </div>
        </section>

        <!-- Player Bar -->
        <footer id="player-bar">
            <!-- Hidden YouTube Player -->
            <div id="yt-player-container">
                <div id="yt-player"></div>
            </div>

            <div class="player-left">
                <img id="player-thumb" src="" alt="">
                <div class="player-meta">
                    <div id="player-title">No track playing</div>
                    <div id="player-artist"></div>
                </div>
                <button id="btn-like" class="icon-btn" title="Like Song"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></button>
            </div>
            
            <div class="player-center">
                <div class="player-controls">
                    <button id="btn-shuffle" class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg></button>
                    <button id="btn-prev" class="icon-btn"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"></line></svg></button>
                    <button id="btn-play-pause" class="circle-btn">
                        <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                    </button>
                    <button id="btn-next" class="icon-btn"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"></line></svg></button>
                    <button id="btn-repeat" class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg></button>
                </div>
                <div class="progress-container">
                    <span id="time-current">0:00</span>
                    <div class="progress-bar" id="progress-bar-el">
                        <div class="progress-fill" id="progress-fill-el"></div>
                    </div>
                    <span id="time-total">0:00</span>
                </div>
            </div>
            
            <div class="player-right">
                <button id="btn-lyrics" class="accent-btn" title="Toggle Lyrics">LYRICS</button>
                <button id="btn-video" class="accent-btn" title="Toggle Video" style="display:none;">VIDEO</button>
                <button id="btn-queue" class="icon-btn" title="Toggle Queue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg></button>
                <div class="volume-control">
                    <svg class="icon-vol" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                    <input type="range" id="vol-slider" min="0" max="100" value="100">
                </div>
            </div>
        </footer>
    </div>
    
    <div id="toast-container"></div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="app.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
      }
    </script>
</body>
</html>
