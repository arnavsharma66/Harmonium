<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="google-site-verification" content="8FkqAluyh1c5AC4ZkEARv3vHpYno_Fof5Kx22YtX2Ec" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmonium</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════
   HARMONIUM  —  Warm Parchment Theme
   ════════════════════════════════════════ */
:root {
  --bg:     #1a1410;
  --s1:     #211c17;
  --s2:     #2a231c;
  --s3:     #352c23;
  --s4:     #4a3f33;
  --s5:     #605244;
  --acc:    #c8956a;
  --acc2:   #e8d5b0;
  --acc3:   #d4a574;
  --text:   #e8d5b0;
  --text2:  #a89070;
  --text3:  #6b5a47;
  --ph:     82px;
  --sb:     220px;
  --r:      8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;
}
button{cursor:pointer;font-family:inherit}
img{display:block}
a{text-decoration:none}

/* ── LOADER ── */
#loader{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  z-index:9999;transition:opacity .6s;
}
#loader.out{opacity:0;pointer-events:none}
.ll{
  font-family:'Instrument Serif',serif;
  font-size:52px;font-weight:400;letter-spacing:-1px;
  color:var(--acc2);
  animation:llp 2s ease-in-out infinite;
}
@keyframes llp{0%,100%{opacity:.15}50%{opacity:1}}

/* ── LANDING ── */
#landing{
  position:fixed;inset:0;
  background:radial-gradient(ellipse at 40% 60%,rgba(200,149,106,.08) 0%,transparent 65%),var(--bg);
  display:flex;align-items:center;justify-content:center;
  z-index:800;opacity:0;visibility:hidden;
  transition:opacity .4s,visibility .4s;
}
#landing.on{opacity:1;visibility:visible}
.land{text-align:center;max-width:380px;padding:40px 32px}
.land-logo{
  font-family:'Instrument Serif',serif;
  font-size:64px;font-weight:400;letter-spacing:-2px;
  color:var(--acc2);
  line-height:1;margin-bottom:6px;
}
.land-tagline{
  font-family:'Instrument Serif',serif;
  font-style:italic;font-size:16px;
  color:var(--acc3);margin-bottom:10px;
  letter-spacing:.3px;
}
.land-sub{font-size:14px;color:var(--text3);line-height:1.9;margin-bottom:36px}
.land-sub strong{color:var(--text2);font-weight:500}
.land-btn{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--acc2);color:#1a1410;border:none;border-radius:var(--r);
  padding:14px 30px;font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:600;letter-spacing:.1px;
  transition:all .2s;
}
.land-btn:hover{background:var(--acc3);transform:translateY(-2px);box-shadow:0 8px 28px rgba(200,149,106,.3)}
.land-btn svg{width:18px;height:18px;flex-shrink:0}
.land-note{font-size:11px;color:var(--text3);margin-top:16px;line-height:2}
.land-note a{color:var(--text3);text-decoration:underline;text-underline-offset:3px;transition:color .15s}
.land-note a:hover{color:var(--text2)}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;height:100vh;opacity:0;transition:opacity .35s;pointer-events:none}
#app.on{opacity:1;pointer-events:all}

/* ── SIDEBAR ── */
#sidebar{
  width:var(--sb);flex-shrink:0;
  background:var(--s1);
  border-right:1px solid rgba(232,213,176,.04);
  display:flex;flex-direction:column;overflow:hidden;
}
.slbl{
  font-size:9px;font-weight:700;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--text3);
  padding:18px 16px 6px;
}
.nb{
  display:flex;align-items:center;gap:11px;
  width:calc(100% - 10px);margin:1px 5px;
  padding:8px 10px;border-radius:var(--r);
  border:none;background:transparent;
  color:var(--text3);font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:500;
  cursor:pointer;transition:all .12s;text-align:left;
}
.nb:hover{background:rgba(232,213,176,.05);color:var(--text2)}
.nb.on{background:rgba(200,149,106,.12);color:var(--text)}
.nb.on svg{color:var(--acc)}
.nb svg{width:15px;height:15px;flex-shrink:0;transition:color .12s}
.sdiv{height:1px;background:rgba(232,213,176,.06);margin:6px 14px}
#pls{
  flex:1;overflow-y:auto;padding:4px 5px 16px;
  scrollbar-width:thin;scrollbar-color:var(--s4) transparent;
}
#pls::-webkit-scrollbar{width:3px}
#pls::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}
.pi{
  display:flex;align-items:center;gap:10px;
  padding:5px 10px;border-radius:var(--r);
  cursor:pointer;transition:background .1s;
}
.pi:hover{background:rgba(232,213,176,.05)}
.pi.on{background:rgba(200,149,106,.1)}
.pi.on .pin{color:var(--acc)}
.pith{
  width:32px;height:32px;border-radius:4px;
  background:var(--s3);flex-shrink:0;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.pith img{width:100%;height:100%;object-fit:cover}
.pin{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text2)}
.pic{font-size:10px;color:var(--text3);margin-top:1px}
.sempty{padding:16px;font-size:12px;color:var(--text3);text-align:center;line-height:1.9}

/* ── MAIN LAYOUT ── */
#main{display:flex;flex:1;overflow:hidden}

/* ── CONTENT ── */
#content{
  flex:1;display:flex;flex-direction:column;
  overflow:hidden;position:relative;background:var(--bg);
}
#ta{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--s4) transparent}
#ta::-webkit-scrollbar{width:5px}
#ta::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}
#tl{padding:0}

/* ── HOME ── */
.hw{padding:32px 32px 100px}

.hgreet-wrap{margin-bottom:28px}
.hgreet{
  font-family:'Instrument Serif',serif;
  font-size:36px;font-weight:400;letter-spacing:-.5px;
  color:var(--text);line-height:1;
}
.hgreet-sub{font-size:13px;color:var(--text3);margin-top:6px;font-weight:400}

/* 2×3 quick-access grid */
.plg{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:6px;margin-bottom:40px;
}
.pgc{
  display:flex;align-items:center;
  background:var(--s2);border-radius:var(--r);
  overflow:hidden;cursor:pointer;height:56px;
  position:relative;transition:background .12s,transform .12s;
  border:1px solid rgba(232,213,176,.04);
}
.pgc:hover{background:var(--s3);transform:translateY(-1px)}
.pgca{width:56px;height:56px;flex-shrink:0;overflow:hidden;background:var(--s3)}
.pgca img{width:100%;height:100%;object-fit:cover;display:block}
.pgcn{
  flex:1;padding:0 12px;
  font-size:13px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:var(--text);
}
.pgcp{
  position:absolute;right:10px;
  width:30px;height:30px;border-radius:50%;
  background:var(--acc);color:var(--bg);border:none;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:translateY(4px) scale(.9);
  transition:all .2s;box-shadow:0 4px 16px rgba(200,149,106,.4);
}
.pgc:hover .pgcp{opacity:1;transform:translateY(0) scale(1)}
.pgcp svg{width:11px;height:11px;margin-left:2px}

/* Section header */
.sec{margin-bottom:40px}
.sec-hd{
  display:flex;align-items:baseline;
  justify-content:space-between;margin-bottom:18px;
}
.sec-title{
  font-family:'Instrument Serif',serif;
  font-size:22px;font-weight:400;letter-spacing:-.3px;
  color:var(--text)
}
.sec-all{
  font-size:11px;color:var(--text3);cursor:pointer;
  font-weight:600;transition:color .15s;
  text-transform:uppercase;letter-spacing:.8px;
}
.sec-all:hover{color:var(--acc)}

/* Horizontal scroll */
.hrow{overflow-x:auto;scrollbar-width:none;margin:0 -4px;padding:4px;padding-bottom:0}
.hrow::-webkit-scrollbar{display:none}
.hri{display:flex;gap:14px;width:max-content}

/* Music card */
.mc{
  width:164px;flex-shrink:0;cursor:pointer;
  padding:12px;border-radius:10px;
  background:var(--s2);
  transition:background .15s,transform .15s;
  position:relative;border:1px solid rgba(232,213,176,.04);
}
.mc:hover{background:var(--s3);transform:translateY(-2px)}
.mca{
  width:140px;height:140px;border-radius:6px;
  background:var(--s3);overflow:hidden;
  position:relative;margin-bottom:12px;
  box-shadow:0 8px 28px rgba(0,0,0,.6);
}
.mca img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.mc:hover .mca img{transform:scale(1.04)}
.mcpb{
  position:absolute;bottom:7px;right:7px;
  width:36px;height:36px;border-radius:50%;
  background:var(--acc);color:var(--bg);border:none;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:translateY(8px);
  transition:all .25s;box-shadow:0 4px 20px rgba(200,149,106,.5);
}
.mc:hover .mcpb{opacity:1;transform:translateY(0)}
.mcpb svg{width:14px;height:14px;margin-left:2px}
.mct{
  font-size:13px;font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:var(--text);margin-bottom:3px;
}
.mcs{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Artist */
.ahd{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.aav{width:36px;height:36px;border-radius:50%;background:var(--s3);overflow:hidden;flex-shrink:0}
.aav img{width:100%;height:100%;object-fit:cover}
.anm{font-size:15px;font-weight:600;color:var(--text)}
.act{font-size:11px;color:var(--text3);margin-top:2px}

/* ── VIEW HEADER (playlist/liked) — Apple Music style ── */
.vhdr{
  display:flex;align-items:flex-end;gap:28px;
  padding:40px 28px 28px;
  position:relative;overflow:hidden;
  min-height:220px;
}
.vhdr-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  filter:blur(60px) saturate(1.2);
  transform:scale(1.1);
  opacity:.18;
}
.vhdr-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(26,20,16,.3) 0%,rgba(26,20,16,.9) 100%);
}
.vart{
  width:180px;height:180px;border-radius:10px;
  background:var(--s3);flex-shrink:0;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.7);
  position:relative;z-index:1;
}
.vart img{width:100%;height:100%;object-fit:cover}
.vinf{flex:1;overflow:hidden;position:relative;z-index:1}
.vtyp{
  font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:2px;
  color:var(--acc3);margin-bottom:8px;
}
.vtit{
  font-family:'Instrument Serif',serif;
  font-size:44px;font-weight:400;
  letter-spacing:-1px;line-height:1.05;
  margin-bottom:10px;color:var(--text);
}
.vmeta{font-size:13px;color:var(--text2);margin-bottom:22px}
.vacts{display:flex;align-items:center;gap:10px}
.vplay{
  display:flex;align-items:center;gap:8px;
  background:var(--acc);color:var(--bg);border:none;
  border-radius:500px;padding:10px 28px;
  font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;
  transition:all .15s;letter-spacing:.2px;
  box-shadow:0 4px 20px rgba(200,149,106,.35);
}
.vplay:hover{background:var(--acc2);transform:scale(1.03)}
.vplay svg{width:14px;height:14px}
.vshuffle{
  display:flex;align-items:center;gap:6px;
  background:transparent;border:1px solid var(--s5);
  color:var(--text2);border-radius:500px;
  padding:9px 20px;font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;
}
.vshuffle:hover{border-color:var(--text2);color:var(--text)}
.vshuffle svg{width:13px;height:13px}

/* ── TRACK TABLE ── */
.ttbl{padding:8px 20px 80px}
.ttblh{
  display:grid;
  grid-template-columns:44px 1fr 100px 54px;
  align-items:center;padding:6px 12px;
  border-bottom:1px solid rgba(232,213,176,.07);
  margin-bottom:4px;
}
.ttblh span{
  font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:1px;color:var(--text3);
}
.ttblh span:last-child{text-align:right}
.tr{
  display:grid;
  grid-template-columns:44px 1fr 100px 54px;
  align-items:center;padding:5px 12px;
  border-radius:var(--r);cursor:pointer;
  transition:background .08s;
}
.tr:hover{background:rgba(232,213,176,.04)}
.tr.on{background:rgba(200,149,106,.1)}
.tn{
  font-size:13px;color:var(--text3);
  text-align:center;font-variant-numeric:tabular-nums;
}
.tr.on .tn{display:none}
.tbs{display:none;justify-content:center;align-items:flex-end;gap:2px;height:14px}
.tr.on .tbs{display:flex}
.tb{width:2px;background:var(--acc);border-radius:1px;animation:tba .7s ease-in-out infinite alternate}
.tb:nth-child(2){animation-delay:.12s;height:8px}
.tb:nth-child(3){animation-delay:.24s}
@keyframes tba{from{height:2px}to{height:12px}}
.tbs.paused .tb{animation-play-state:paused}
.tri{display:flex;align-items:center;gap:12px;overflow:hidden;min-width:0}
.tat{width:40px;height:40px;border-radius:5px;background:var(--s3);flex-shrink:0;overflow:hidden}
.tat img{width:100%;height:100%;object-fit:cover}
.tit{overflow:hidden;min-width:0}
.ttl{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.tr.on .ttl{color:var(--acc)}
.tch{font-size:11px;color:var(--text3);margin-top:2px}
.tactions{
  display:flex;align-items:center;gap:2px;
  justify-content:center;opacity:0;transition:opacity .12s;
}
.tr:hover .tactions,.tr.on .tactions{opacity:1}
.tact{
  background:transparent;border:none;color:var(--text3);
  padding:4px;border-radius:3px;display:flex;transition:color .12s;
}
.tact:hover{color:var(--text)}
.tact.liked{color:var(--acc)!important;opacity:1!important}
.tact svg{width:14px;height:14px}
.tdur{font-size:12px;color:var(--text3);text-align:right;font-variant-numeric:tabular-nums}

/* ── QUEUE ── */
#qp{
  position:absolute;top:0;right:0;bottom:0;width:268px;
  background:var(--s1);border-left:1px solid rgba(232,213,176,.05);
  display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:20;
}
#qp.open{transform:translateX(0)}
#qph{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px;border-bottom:1px solid rgba(232,213,176,.06);flex-shrink:0;
}
#qph h3{font-size:13px;font-weight:700;color:var(--text)}
#qcnt{font-size:11px;color:var(--text3);margin-top:2px}
#qcl{background:transparent;border:none;color:var(--text3);font-size:20px;line-height:1;padding:2px;transition:color .15s}
#qcl:hover{color:var(--text)}
#ql{flex:1;overflow-y:auto;padding:6px;scrollbar-width:thin;scrollbar-color:var(--s4) transparent}
.qi{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:var(--r);cursor:pointer;transition:background .1s}
.qi:hover{background:rgba(232,213,176,.05)}
.qi.qa{background:rgba(200,149,106,.08)}
.qia{width:34px;height:34px;border-radius:4px;background:var(--s3);flex-shrink:0;overflow:hidden}
.qia img{width:100%;height:100%;object-fit:cover}
.qii{flex:1;overflow:hidden}
.qit{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text2)}
.qi.qa .qit{color:var(--acc)}
.qic{font-size:10px;color:var(--text3)}
.qrm{background:transparent;border:none;color:var(--text3);padding:4px;opacity:0;font-size:16px;transition:all .12s;flex-shrink:0}
.qi:hover .qrm{opacity:1}
.qrm:hover{color:#f55}
#qclrbtn{
  margin:8px;padding:9px;background:transparent;
  border:1px solid rgba(232,213,176,.08);border-radius:var(--r);
  color:var(--text3);font-family:'DM Sans',sans-serif;
  font-size:12px;cursor:pointer;
  width:calc(100% - 16px);transition:all .15s;
}
#qclrbtn:hover{border-color:#f55;color:#f55}

/* ── STATES ── */
.stctr{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:260px;gap:10px;
  color:var(--text3);text-align:center;padding:40px;
}
.stctr p{font-size:14px;line-height:1.8;max-width:280px}
.stctr strong{color:var(--text2)}
.spin{
  width:18px;height:18px;
  border:2px solid var(--s4);
  border-top-color:var(--acc);
  border-radius:50%;
  animation:sp .6s linear infinite;flex-shrink:0;
}
@keyframes sp{to{transform:rotate(360deg)}}
.ldrow{
  display:flex;align-items:center;justify-content:center;
  gap:10px;padding:80px;font-size:13px;color:var(--text3);
}

/* ════════════════════════════════════════
   PLAYER BAR
   ════════════════════════════════════════ */
#player{
  height:var(--ph);
  background:rgba(20,16,12,.97);
  backdrop-filter:blur(32px);
  -webkit-backdrop-filter:blur(32px);
  border-top:1px solid rgba(232,213,176,.07);
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:0 20px;
  flex-shrink:0;z-index:200;
  gap:16px;
}

/* NOW PLAYING */
#np{
  display:flex;align-items:center;gap:12px;
  overflow:hidden;cursor:pointer;
  min-width:0;
}
#np:hover #npt{color:var(--acc)}
#npa{
  width:50px;height:50px;border-radius:var(--r);
  background:var(--s3);flex-shrink:0;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
#npa img{width:100%;height:100%;object-fit:cover}
#npa::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(200,149,106,.1),transparent);
  pointer-events:none;
}
#npi{overflow:hidden;flex:1;min-width:0}
#npt{
  font-size:13px;font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:var(--text);transition:color .15s;
}
#npc{
  font-size:11px;color:var(--text3);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#nlbtn{
  background:transparent;border:none;color:var(--text3);
  padding:4px;flex-shrink:0;display:flex;transition:color .15s;
}
#nlbtn:hover,#nlbtn.liked{color:var(--acc)}
#nlbtn svg{width:14px;height:14px}

/* CONTROLS */
#ct{
  display:flex;flex-direction:column;
  align-items:center;gap:6px;
  width:440px;flex-shrink:0;
}
.cr{display:flex;align-items:center;gap:14px}
.cb{
  background:transparent;border:none;
  color:var(--text3);padding:5px;
  transition:all .12s;display:flex;
  align-items:center;justify-content:center;
  border-radius:4px;
}
.cb:hover{color:var(--text);transform:scale(1.1)}
.cb.on{color:var(--acc)}
.cb svg{width:15px;height:15px;display:block}
#bplay{
  width:36px;height:36px;
  background:var(--acc2);border-radius:50%;
  color:var(--bg);transition:all .12s;
  box-shadow:0 2px 12px rgba(0,0,0,.4);
}
#bplay:hover{background:var(--acc);transform:scale(1.06);box-shadow:0 4px 20px rgba(200,149,106,.4)}
#bplay svg{width:15px;height:15px}

/* Progress bar */
.prow{display:flex;align-items:center;gap:8px;width:100%}
.ptm{font-size:10px;color:var(--text3);font-variant-numeric:tabular-nums;width:32px;flex-shrink:0}
.ptm:last-child{text-align:right}
#pb{
  flex:1;cursor:pointer;position:relative;
  user-select:none;
  padding:10px 0;margin:-10px 0;
  background:transparent;
}
#pb-track{
  position:absolute;left:0;right:0;
  top:50%;transform:translateY(-50%);
  height:3px;background:var(--s4);
  border-radius:3px;
  transition:height .15s;
  pointer-events:none;
}
#pb:hover #pb-track,#pb.drag #pb-track{height:5px}
#pf{
  position:absolute;left:0;top:50%;
  transform:translateY(-50%);
  height:3px;background:var(--text2);
  border-radius:3px;width:0%;
  pointer-events:none;
  transition:height .15s;
}
#pb:hover #pf,#pb.drag #pf{height:5px;background:var(--acc)}
#pdot{
  position:absolute;right:-5px;top:50%;
  transform:translateY(-50%) scale(0);
  width:11px;height:11px;border-radius:50%;
  background:var(--acc2);pointer-events:none;
  transition:transform .15s;
}
#pb:hover #pdot,#pb.drag #pdot{transform:translateY(-50%) scale(1)}

/* RIGHT controls */
#pr{
  display:flex;align-items:center;
  gap:6px;justify-content:flex-end;
}
.pb2{
  background:transparent;border:none;
  color:var(--text3);padding:5px;
  display:flex;transition:color .15s;border-radius:4px;
  font-family:'DM Sans',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:.5px;
  align-items:center;gap:4px;
}
.pb2:hover,.pb2.on{color:var(--acc)}
.pb2 svg{width:14px;height:14px}
.vol{display:flex;align-items:center;gap:6px}
.vol svg{width:13px;height:13px;color:var(--text3);flex-shrink:0}
#vs{
  -webkit-appearance:none;width:80px;height:3px;
  background:var(--s4);border-radius:3px;outline:none;cursor:pointer;
}
#vs::-webkit-slider-thumb{
  -webkit-appearance:none;width:11px;height:11px;
  border-radius:50%;background:var(--acc2);cursor:pointer;
  opacity:0;transition:opacity .12s;
}
.vol:hover #vs::-webkit-slider-thumb{opacity:1}
#vtbtn{
  background:transparent;border:none;
  color:var(--text3);font-size:10px;
  font-weight:700;letter-spacing:.5px;
  cursor:pointer;padding:5px 7px;
  border-radius:4px;display:none;
  transition:color .15s;
  font-family:'DM Sans',sans-serif;
  text-transform:uppercase;
}
#vtbtn:hover{color:var(--acc)}

/* ── LYRICS PANEL ── */
#lyrpanel{
  position:fixed;
  left:var(--sb);right:0;
  bottom:var(--ph);height:0;
  background:rgba(20,16,12,.96);
  backdrop-filter:blur(40px);
  -webkit-backdrop-filter:blur(40px);
  border-top:1px solid rgba(200,149,106,.15);
  overflow:hidden;
  transition:height .35s cubic-bezier(.4,0,.2,1);
  z-index:150;
}
#lyrpanel.open{height:320px}
#lyri{
  height:320px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  overflow:hidden;pointer-events:none;
  -webkit-mask-image:linear-gradient(to bottom,transparent 0%,black 20%,black 80%,transparent 100%);
  mask-image:linear-gradient(to bottom,transparent 0%,black 20%,black 80%,transparent 100%);
}
#lyrl{
  display:flex;flex-direction:column;gap:20px;
  width:100%;max-width:720px;padding:0 48px;
  position:relative;
  transition:transform .45s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}
.lline{
  font-family:'Instrument Serif',serif;
  font-size:18px;font-weight:400;line-height:1.5;
  color:rgba(232,213,176,.1);user-select:none;
  transition:color .35s,font-size .35s,font-weight .35s;
}
.lline.near{color:rgba(232,213,176,.35);font-size:20px}
.lline.active{color:var(--acc2);font-size:24px;font-weight:400}
#lyrempty{color:var(--text3);font-size:14px;text-align:center;width:100%}

/* ── YT ── */
#yw{
  position:fixed;bottom:calc(var(--ph)+10px);right:18px;
  width:268px;height:150px;border-radius:var(--r);
  overflow:hidden;border:1px solid rgba(232,213,176,.08);
  background:#000;z-index:210;
  transform:translateY(14px);opacity:0;
  transition:all .25s;pointer-events:none;
}
#yw.show{transform:translateY(0);opacity:1;pointer-events:all}
#yf{width:100%;height:100%}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:calc(var(--ph)+16px);left:50%;
  transform:translateX(-50%) translateY(6px);
  background:var(--s3);border:1px solid rgba(232,213,176,.1);
  border-radius:500px;padding:8px 20px;
  font-size:13px;font-weight:500;color:var(--text2);
  opacity:0;pointer-events:none;
  transition:all .2s;z-index:600;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── TOPBAR ── */
#topbar{
  height:52px;flex-shrink:0;
  display:flex;align-items:center;
  padding:0 18px;gap:12px;
  background:rgba(20,16,12,.9);
  backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(232,213,176,.05);
  z-index:100;
}
.tlogo{
  font-family:'Instrument Serif',serif;
  font-size:20px;font-weight:400;letter-spacing:-.5px;
  color:var(--acc2);
  flex-shrink:0;cursor:pointer;user-select:none;
}
#sb{
  flex:1;max-width:320px;
  display:flex;align-items:center;
  background:var(--s2);border-radius:var(--r);
  padding:0 12px;gap:8px;
  border:1px solid transparent;transition:border .15s;
}
#sb:focus-within{border-color:rgba(232,213,176,.12)}
#sb svg{width:13px;height:13px;color:var(--text3);flex-shrink:0}
#si{
  background:transparent;border:none;outline:none;
  color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:13px;width:100%;padding:8px 0;
}
#si::placeholder{color:var(--text3)}
.fpills{display:flex;gap:5px}
.fp{
  background:transparent;border:1px solid var(--s4);
  border-radius:500px;padding:4px 12px;
  font-family:'DM Sans',sans-serif;
  font-size:11px;font-weight:600;color:var(--text3);
  cursor:pointer;transition:all .15s;
  letter-spacing:.3px;text-transform:uppercase;
}
.fp.on{background:var(--acc);border-color:var(--acc);color:var(--bg)}
.fp:hover:not(.on){border-color:var(--text3);color:var(--text2)}
.tbr{display:flex;align-items:center;gap:10px;margin-left:auto}
#uav{width:26px;height:26px;border-radius:50%;object-fit:cover;border:1.5px solid var(--s5)}
#unm{font-size:13px;color:var(--text2);font-weight:500}
#lob{background:transparent;border:none;color:var(--text3);font-size:12px;cursor:pointer;padding:4px 6px;transition:color .15s}
#lob:hover{color:var(--text)}
</style>
</head>

      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </a>

<div id="app">
  <div id="topbar">

    <div id="sb">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

  <div id="main">
    <div id="sidebar">

      <button class="nb" id="nh" onclick="goHome()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home

      </div>

      <button id="nlbtn" onclick="toggleLike()" title="Like">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      </button>

    <div id="ct">
      <div class="cr">
        <button class="cb" id="bsh" onclick="toggleShuffle()" title="Shuffle (S)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
        </button>

          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg>

          <svg id="ipause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <button class="cb" onclick="nextT()" title="Next (N)">

<script>
'use strict';
const API=location.hostname==='localhost'||location.hostname==='127.0.0.1'?'http://localhost:5000':'https://harmonium.onrender.com';
let ytp=null,ytR=false,vidOn=false,lyrOpen=false;
let fm=localStorage.getItem('hfm')||'music';
let lyrs=[],lyT=null,lastLI=-1;
let liked=new Set(JSON.parse(localStorage.getItem('hlik')||'[]'));
let allPl=[];
let dragging=false;
const S={q:[],i:-1,pl:false,sh:false,rp:false,dur:0};

function getH(){try{return JSON.parse(localStorage.getItem('hph')||'{}')}catch{return{}}}
function trackP(t){const h=getH();if(!h[t.id])h[t.id]={...t,plays:0,last:0};h[t.id].plays++;h[t.id].last=Date.now();h[t.id].title=t.title;h[t.id].ch=t.ch;h[t.id].thumb=t.thumb;h[t.id].rawDur=t.rawDur;localStorage.setItem('hph',JSON.stringify(h));}
function saveL(){localStorage.setItem('hlik',JSON.stringify([...liked]));}

window.addEventListener('load',()=>{
  loadYT();setFUI(fm);
  const p=new URLSearchParams(location.search);
  const tok=p.get('h_token');
  if(tok){localStorage.setItem('htok',tok);history.replaceState({},'','/');}
  checkAuth();
});

async function checkAuth(){
  const tok=localStorage.getItem('htok');
  if(!tok){hideLoader();showLanding();return;}
  try{
    const u=await req('/auth/me');
    if(u.error){localStorage.removeItem('htok');hideLoader();showLanding();return;}
    showApp(u);setupDrag();await loadSidebar();goHome();hideLoader();
  }catch{hideLoader();showLanding();}
}
function hideLoader(){const l=document.getElementById('loader');l.classList.add('out');setTimeout(()=>l.style.display='none',600);}
function showLanding(){document.getElementById('landing').classList.add('on');}
function showApp(u){
  document.getElementById('landing').classList.remove('on');
  document.getElementById('app').classList.add('on');
  document.getElementById('uav').src=u.picture||'';
  document.getElementById('unm').textContent=(u.name||'').split(' ')[0];
}
async function doLogout(){const tok=localStorage.getItem('htok');if(tok)await fetch(`${API}/auth/logout`,{method:'POST',headers:{Authorization:`Bearer ${tok}`}}).catch(()=>{});localStorage.removeItem('htok');location.reload();}

function setFilter(m){fm=m;localStorage.setItem('hfm',m);setFUI(m);const a=document.querySelector('.nb.on');if(a?.id==='nl')goLiked();else goHome();}
function setFUI(m){document.getElementById('pfm').classList.toggle('on',m==='music');document.getElementById('pfa').classList.toggle('on',m==='all');}
function isMusic(t){
  if(fm==='all')return true;
  if(!t.rawDur)return true;
  const m=t.rawDur.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m)return true;
  return(+m[1]||0)===0&&(+m[2]||0)<20;
}
function filt(arr){return arr.filter(isMusic);}

async function req(path,params={}){
  const url=new URL(API+path);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const tok=localStorage.getItem('htok');
  const r=await fetch(url,{headers:tok?{Authorization:`Bearer ${tok}`}:{}});
  if(r.status===401){localStorage.removeItem('htok');showLanding();throw new Error('401');}
  return r.json();
}

function setNav(id){
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.pi').forEach(p=>p.classList.remove('on'));
  document.getElementById(id)?.classList.add('on');
}

async function goHome(){
  setNav('nh');
  if(!window._lc){
    try{
      let t=[],pt='';
      do{const d=await req('/api/liked',pt?{pageToken:pt}:{});if(!d?.items)break;t=t.concat(d.items.map(mv));pt=d.nextPageToken||'';}while(pt&&t.length<100);
      window._lc=t;
    }catch{}
  }
  const h=getH();
  const mp=Object.values(h).filter(isMusic).sort((a,b)=>b.plays-a.plays).slice(0,25);
  const rl=window._lc?filt(window._lc).slice(0,25):[];
  const dm=rl.length?[...rl].sort(()=>Math.random()-.5).slice(0,25):[];
  const am={};
  Object.values(h).filter(isMusic).forEach(t=>{if(!t.ch)return;if(!am[t.ch])am[t.ch]={name:t.ch,thumb:t.thumb,tracks:[]};am[t.ch].tracks.push(t);});
  const artists=Object.values(am).filter(a=>a.tracks.length>=2).sort((a,b)=>b.tracks.length-a.tracks.length).slice(0,4);
  const gridPl=allPl.slice(0,6);
  const hr=new Date().getHours();
  const g=hr<12?'Good morning':(hr<17?'Good afternoon':'Good evening');

  let html=`<div class="hw">
    <div class="hgreet-wrap">
      <div class="hgreet">${g}</div>
      <div class="hgreet-sub">What are we listening to today?</div>
    </div>`;

  if(gridPl.length){
    html+=`<div class="plg">`;
    gridPl.forEach(p=>{
      const img=p.snippet.thumbnails?.medium?.url||p.snippet.thumbnails?.default?.url||'';
      html+=`<div class="pgc" onclick="loadPlById('${X(p.id)}','${X(p.snippet.title)}')">
        <div class="pgca">${img?`<img src="${img}" alt=""/>`:''}</div>
        <div class="pgcn">${X(p.snippet.title)}</div>
        <button class="pgcp" onclick="event.stopPropagation();loadPlById('${X(p.id)}','${X(p.snippet.title)}',null,true)">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
      </div>`;
    });
    html+=`</div>`;
  }

  if(mp.length){
    html+=`<div class="sec"><div class="sec-hd"><div class="sec-title">Most played</div></div><div class="hrow"><div class="hri">`;
    mp.forEach(t=>{html+=mcard(t,`pFH('${X(t.id)}')`)});
    html+=`</div></div></div>`;
  }
  if(rl.length){
    html+=`<div class="sec"><div class="sec-hd"><div class="sec-title">Recently liked</div><div class="sec-all" onclick="goLiked()">See all</div></div><div class="hrow"><div class="hri">`;
    rl.forEach((t,i)=>{html+=mcard(t,`pFL(${i})`)});
    html+=`</div></div></div>`;
  }
  if(dm.length){
    html+=`<div class="sec"><div class="sec-hd"><div class="sec-title">Daily mix</div></div><div class="hrow"><div class="hri">`;
    dm.forEach(t=>{html+=mcard(t,`pFH('${X(t.id)}')`)});
    html+=`</div></div></div>`;
  }
  if(artists.length){
    html+=`<div class="sec"><div class="sec-hd"><div class="sec-title">Your artists</div></div>`;
    artists.forEach(a=>{
      html+=`<div style="margin-bottom:24px"><div class="ahd"><div class="aav">${a.thumb?`<img src="${X(a.thumb)}" alt=""/>`:''}</div><div><div class="anm">${X(a.name)}</div><div class="act">${a.tracks.length} tracks</div></div></div><div class="hrow"><div class="hri">`;
      a.tracks.slice(0,15).forEach(t=>{html+=mcard(t,`pFH('${X(t.id)}')`)});
      html+=`</div></div></div>`;
    });
    html+=`</div>`;
  }
  if(!mp.length&&!rl.length){
    html+=`<div class="stctr"><p><strong>Nothing here yet.</strong><br>Play some music and your home screen will fill up.</p></div>`;
  }
  html+=`</div>`;
  document.getElementById('tl').innerHTML=html;
}

function mcard(t,oc){
  return`<div class="mc" onclick="${oc}">
    <div class="mca">${t.thumb?`<img src="${X(t.thumb)}" loading="lazy" alt=""/>`:''}<button class="mcpb" onclick="event.stopPropagation();${oc}"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></button></div>
    <div class="mct">${X(t.title)}</div>
    <div class="mcs">${t.plays?t.plays+' plays · ':''}${X(t.ch||'')}</div>
  </div>`;
}
function pFH(id){const idx=S.q.findIndex(t=>t.id===id);if(idx>=0){play(idx);return;}const h=getH();const t=h[id];if(t){S.q=[t];S.i=-1;play(0);}}
function pFL(i){if(window._lc){S.q=filt([...window._lc]);play(i);}}

async function loadSidebar(){
  const el=document.getElementById('pls');
  el.innerHTML='<div class="sempty"><div class="spin" style="margin:0 auto 8px"></div></div>';
  try{
    let items=[],pt='';
    do{const d=await req('/api/playlists',pt?{pageToken:pt}:{});if(!d?.items)break;items=items.concat(d.items);pt=d.nextPageToken||'';}while(pt&&items.length<300);
    allPl=items;
    if(!items.length){el.innerHTML='<div class="sempty">No playlists</div>';return;}
    el.innerHTML=items.map(p=>{const t=p.snippet.thumbnails?.default?.url||'',c=p.contentDetails?.itemCount??'?';return`<div class="pi" onclick="loadPlById('${X(p.id)}','${X(p.snippet.title)}',this)"><div class="pith">${t?`<img src="${t}" loading="lazy" alt=""/>`:''}</div><div><div class="pin">${X(p.snippet.title)}</div><div class="pic">${c} items</div></div></div>`;}).join('');
  }catch{el.innerHTML='<div class="sempty">Failed to load</div>';}
}

async function goLiked(){
  setNav('nl');
  document.getElementById('tl').innerHTML='<div class="ldrow"><div class="spin"></div></div>';
  try{
    let t=[],pt='';
    do{const d=await req('/api/liked',pt?{pageToken:pt}:{});if(!d?.items)break;t=t.concat(d.items.map(mv));pt=d.nextPageToken||'';}while(pt&&t.length<200);
    window._lc=t;
    renderView(filt(t),'Liked',t[0]?.thumb||'',filt(t).length,t.length);
  }catch{document.getElementById('tl').innerHTML='<div class="stctr"><p>Failed to load</p></div>';}
}

async function loadPlById(id,title,el=null,autoplay=false){
  document.querySelectorAll('.nb,.pi').forEach(b=>b.classList.remove('on'));
  el?.classList.add('on');
  document.getElementById('tl').innerHTML='<div class="ldrow"><div class="spin"></div></div>';
  try{
    let t=[],pt='';
    do{
      const d=await req('/api/playlist-items',{playlistId:id,...(pt?{pageToken:pt}:{})});
      if(!d?.items)break;
      const ids=d.items.map(i=>i.contentDetails?.videoId).filter(Boolean);
      if(ids.length){const vd=await req('/api/videos',{id:ids.join(',')});if(vd?.items)t=t.concat(vd.items.map(mv));}
      pt=d.nextPageToken||'';
    }while(pt&&t.length<200);
    const f=filt(t);
    renderView(f,title,f[0]?.thumb||t[0]?.thumb||'',f.length,t.length);
    if(autoplay&&f.length)play(0);
  }catch{document.getElementById('tl').innerHTML='<div class="stctr"><p>Failed to load</p></div>';}
}

async function onSearch(e){
  if(e.key!=='Enter')return;
  const q=document.getElementById('si').value.trim();if(!q)return;
  document.querySelectorAll('.nb,.pi').forEach(b=>b.classList.remove('on'));
  document.getElementById('tl').innerHTML='<div class="ldrow"><div class="spin"></div></div>';
  try{
    const sd=await req('/api/search',{q});
    if(!sd?.items?.length){renderView([],'Search results','',0,0);return;}
    const ids=sd.items.map(i=>i.id?.videoId||i.id).filter(Boolean);
    const vd=await req('/api/videos',{id:ids.join(',')});
    const t=filt((vd?.items||[]).map(mv));
    renderView(t,`"${q}"`,t[0]?.thumb||'',t.length,t.length);
  }catch{document.getElementById('tl').innerHTML='<div class="stctr"><p>Search failed</p></div>';}
}

function renderView(tracks,title,art,shown,total){
  S.q=tracks;
  const hidden=total-shown;
  let html=`<div class="vhdr">
    ${art?`<div class="vhdr-bg" style="background-image:url('${art}')"></div>`:''}
    <div class="vhdr-overlay"></div>
    <div class="vart">${art?`<img src="${art}" alt=""/>`:''}</div>
    <div class="vinf">
      <div class="vtyp">Playlist</div>
      <div class="vtit">${X(title)}</div>
      <div class="vmeta">${shown} track${shown!==1?'s':''}${hidden>0&&fm==='music'?` · <span style="color:var(--text3)">${hidden} hidden</span>`:''}</div>
      <div class="vacts">
        <button class="vplay" onclick="playAll()"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>Play</button>
        <button class="vshuffle" onclick="shufflePlay()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>Shuffle</button>
      </div>
    </div>
  </div>`;

  if(!tracks.length){
    html+=fm==='music'?'<div class="stctr"><p>No music tracks.<br><span style="font-size:12px;color:var(--text3)">Switch to All to see everything.</span></p></div>':'<div class="stctr"><p>Empty.</p></div>';
    document.getElementById('tl').innerHTML=html;return;
  }
  html+=`<div class="ttbl"><div class="ttblh"><span>#</span><span>Title</span><span></span><span>Dur</span></div>`;
  tracks.forEach((t,i)=>{
    const lk=liked.has(t.id);
    html+=`<div class="tr${S.i===i?' on':''}" id="tr${i}" onclick="play(${i})">
      <div class="tn">${i+1}<div class="tbs${!S.pl?' paused':''}"><div class="tb" style="height:7px"></div><div class="tb"></div><div class="tb" style="height:5px"></div></div></div>
      <div class="tri"><div class="tat">${t.thumb?`<img src="${t.thumb}" loading="lazy" alt=""/>`:''}</div><div class="tit"><div class="ttl">${X(t.title)}</div><div class="tch">${X(t.ch)}</div></div></div>
      <div class="tactions">
        <button class="tact${lk?' liked':''}" onclick="event.stopPropagation();toggleLT('${X(t.id)}',this)" title="Like">
          <svg viewBox="0 0 24 24" fill="${lk?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        </button>
        <button class="tact" onclick="event.stopPropagation();shareT('${X(t.id)}')" title="Share">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </button>
      </div>
      <div class="tdur">${t.dur}</div>
    </div>`;
  });
  html+=`</div>`;
  document.getElementById('tl').innerHTML=html;
  updateQ();
}

function mv(v){return{id:v.id,title:v.snippet.title,ch:v.snippet.channelTitle,thumb:v.snippet.thumbnails?.medium?.url||v.snippet.thumbnails?.default?.url||'',dur:pdur(v.contentDetails?.duration||''),rawDur:v.contentDetails?.duration||''};}

function loadYT(){const s=document.createElement('script');s.src='https://www.youtube.com/iframe_api';document.head.appendChild(s);}
window.onYouTubeIframeAPIReady=()=>{
  ytp=new YT.Player('yf',{height:'150',width:'268',playerVars:{autoplay:0,controls:0,playsinline:1,enablejsapi:1,rel:0},events:{
    onReady:()=>{ytR=true;ytp.setVolume(85);},
    onStateChange:e=>{const P=YT.PlayerState;
      if(e.data===P.PLAYING){S.pl=true;showPause();startProg();showVT();updBars(true);}
      else if(e.data===P.PAUSED){S.pl=false;showPlay();stopProg();updBars(false);}
      else if(e.data===P.ENDED){nextT();}
    }
  }});
};

function play(i){
  if(!ytR){toast('Player loading…');return;}
  S.i=i;const t=S.q[i];if(!t)return;
  document.querySelectorAll('.tr').forEach((el,j)=>el.classList.toggle('on',j===i));
  ytp.loadVideoById(t.id);
  ytp.setVolume(parseInt(document.getElementById('vs').value));
  document.getElementById('npt').textContent=t.title;
  document.getElementById('npc').textContent=t.ch;
  const npa=document.getElementById('npa');
  npa.innerHTML=t.thumb?`<img src="${t.thumb}" style="width:100%;height:100%;object-fit:cover;border-radius:6px" alt=""/>`:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6b5a47" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>';
  document.getElementById('nlbtn').classList.toggle('liked',liked.has(t.id));
  document.getElementById(`tr${i}`)?.scrollIntoView({block:'nearest',behavior:'smooth'});
  S.pl=true;showPause();trackP(t);updateQ();
  if(lyrOpen)fetchLyrics(t);
}
function playAll(){if(S.q.length)play(0);}
function shufflePlay(){if(!S.q.length)return;S.sh=true;document.getElementById('bsh').classList.add('on');play(Math.floor(Math.random()*S.q.length));toast('Shuffle on');}
function togglePlay(){if(!ytR||S.i<0)return;S.pl?ytp.pauseVideo():ytp.playVideo();}
function prevT(){if(S.i>0)play(S.i-1);else if(S.rp&&S.q.length)play(S.q.length-1);}
function nextT(){
  if(S.sh&&S.q.length>1){let n;do{n=Math.floor(Math.random()*S.q.length);}while(n===S.i&&S.q.length>1);play(n);return;}
  if(S.i<S.q.length-1)play(S.i+1);else if(S.rp&&S.q.length)play(0);
}
function toggleShuffle(){S.sh=!S.sh;document.getElementById('bsh').classList.toggle('on',S.sh);toast(S.sh?'Shuffle on':'Shuffle off');}
function toggleRepeat(){S.rp=!S.rp;document.getElementById('brp').classList.toggle('on',S.rp);toast(S.rp?'Repeat on':'Repeat off');}
function setVol(v){if(ytR)ytp.setVolume(parseInt(v));}
function showVT(){document.getElementById('vtbtn').style.display='block';}
function toggleVid(){vidOn=!vidOn;document.getElementById('yw').classList.toggle('show',vidOn);document.getElementById('vtbtn').textContent=vidOn?'HIDE VIDEO':'VIDEO';}
function showPlay(){document.getElementById('iplay').style.display='';document.getElementById('ipause').style.display='none';}
function showPause(){document.getElementById('iplay').style.display='none';document.getElementById('ipause').style.display='';}
function updBars(p){document.querySelectorAll('.tr.on .tbs').forEach(b=>b.classList.toggle('paused',!p));}

function toggleLT(id,btn){
  if(liked.has(id)){liked.delete(id);btn.classList.remove('liked');btn.querySelector('svg').setAttribute('fill','none');}
  else{liked.add(id);btn.classList.add('liked');btn.querySelector('svg').setAttribute('fill','currentColor');}
  saveL();toast(liked.has(id)?'Liked':'Removed like');
}
function toggleLike(){
  if(S.i<0)return;const t=S.q[S.i];if(!t)return;
  if(liked.has(t.id))liked.delete(t.id);else liked.add(t.id);
  saveL();document.getElementById('nlbtn').classList.toggle('liked',liked.has(t.id));
  toast(liked.has(t.id)?'Liked':'Removed like');
}
function shareT(id){navigator.clipboard.writeText(`https://www.youtube.com/watch?v=${id}`).then(()=>toast('Link copied!')).catch(()=>window.open(`https://www.youtube.com/watch?v=${id}`,'_blank'));}

function setupDrag(){
  const pb=document.getElementById('pb');
  if(!pb)return;
  function seek(clientX){
    if(!ytR||S.dur<=0)return;
    const r=pb.getBoundingClientRect();
    const pct=Math.max(0,Math.min(1,(clientX-r.left)/r.width));
    document.getElementById('pf').style.width=(pct*100)+'%';
    document.getElementById('pf').style.transition='none';
    setTimeout(()=>{if(document.getElementById('pf'))document.getElementById('pf').style.transition='';},150);
    ytp.seekTo(pct*S.dur,true);
  }
  pb.addEventListener('mousedown',e=>{dragging=true;pb.classList.add('drag');seek(e.clientX);e.preventDefault();});
  document.addEventListener('mousemove',e=>{if(dragging)seek(e.clientX);});
  document.addEventListener('mouseup',()=>{if(dragging){dragging=false;pb.classList.remove('drag');}});
  pb.addEventListener('touchstart',e=>{dragging=true;pb.classList.add('drag');if(e.touches[0])seek(e.touches[0].clientX);},{passive:true});
  document.addEventListener('touchmove',e=>{if(dragging&&e.touches[0])seek(e.touches[0].clientX);},{passive:true});
  document.addEventListener('touchend',()=>{if(dragging){dragging=false;pb.classList.remove('drag');}});
}

let ptimer=null;
function startProg(){
  stopProg();
  ptimer=setInterval(()=>{
    if(!ytR||!ytp.getCurrentTime)return;
    const c=ytp.getCurrentTime()||0,d=ytp.getDuration()||0;
    S.dur=d;const pct=d>0?(c/d*100)+'%':'0%';
    if(!dragging)document.getElementById('pf').style.width=pct;
    document.getElementById('ptc').textContent=fmt(c);
    document.getElementById('ptt').textContent=fmt(d);
    if(lyrOpen)syncLyr(c);
  },500);
}
function stopProg(){clearInterval(ptimer);}

function toggleLyr(){
  lyrOpen=!lyrOpen;
  document.getElementById('lyrpanel').classList.toggle('open',lyrOpen);
  document.getElementById('lyrbtn').classList.toggle('on',lyrOpen);
  if(lyrOpen&&S.i>=0)fetchLyrics(S.q[S.i]);
  else if(!lyrOpen){clearInterval(lyT);lyT=null;}
}

async function fetchLyrics(t){
  const ll=document.getElementById('lyrl');
  ll.innerHTML='<div id="lyrempty">Loading…</div>';
  lyrs=[];lastLI=-1;clearInterval(lyT);lyT=null;
  try{
    const artist=encodeURIComponent((t.ch||'').replace(/VEVO|Official|Music|Records|Topic/gi,'').trim());
    const title=encodeURIComponent(t.title.replace(/\(.*?\)|\[.*?\]|ft\..*|feat\..*/gi,'').trim());
    const r=await fetch(`https://lrclib.net/api/search?artist_name=${artist}&track_name=${title}`);
    const res=await r.json();
    if(!res?.length){ll.innerHTML='<div id="lyrempty">No lyrics found</div>';return;}
    const best=res[0];
    if(best.syncedLyrics){
      lyrs=best.syncedLyrics.split('\n').map(l=>{const m=l.match(/\[(\d+):(\d+\.\d+)\](.*)/);if(!m)return null;return{time:parseInt(m[1])*60+parseFloat(m[2]),text:m[3].trim()};}).filter(l=>l&&l.text);
      ll.innerHTML=lyrs.map((l,i)=>`<div class="lline" id="ll${i}">${X(l.text)}</div>`).join('');
    }else if(best.plainLyrics){
      ll.innerHTML=best.plainLyrics.split('\n').map(l=>`<div class="lline">${X(l)||'&nbsp;'}</div>`).join('');
    }else{ll.innerHTML='<div id="lyrempty">No lyrics found</div>';}
  }catch{ll.innerHTML='<div id="lyrempty">Could not load</div>';}
}

function syncLyr(cur){
  if(!lyrs.length)return;
  let ai=0;for(let i=0;i<lyrs.length;i++){if(lyrs[i].time<=cur)ai=i;}
  if(ai===lastLI)return;lastLI=ai;
  document.querySelectorAll('.lline').forEach((el,i)=>{
    el.classList.remove('active','near');
    const d=i-ai;
    if(d===0)el.classList.add('active');
    else if(Math.abs(d)<=2)el.classList.add('near');
  });
  const active=document.getElementById('ll'+ai);
  const panel=document.getElementById('lyri');
  const cont=document.getElementById('lyrl');
  if(active&&panel&&cont){
    const ph=panel.offsetHeight;
    cont.style.transform=`translateY(${(ph/2)-active.offsetTop-(active.offsetHeight/2)}px)`;
  }
}

function toggleQ(){const p=document.getElementById('qp'),b=document.getElementById('qtbtn'),o=p.classList.contains('open');p.classList.toggle('open',!o);b.classList.toggle('on',!o);if(!o)updateQ();}
function updateQ(){
  const l=document.getElementById('ql'),c=document.getElementById('qcnt');
  c.textContent=`${S.q.length} track${S.q.length!==1?'s':''}`;
  if(!S.q.length){l.innerHTML='<div class="sempty">Queue is empty</div>';return;}
  l.innerHTML=S.q.map((t,i)=>`<div class="qi${S.i===i?' qa':''}" onclick="play(${i})"><div class="qia">${t.thumb?`<img src="${t.thumb}" loading="lazy" alt=""/>`:''}</div><div class="qii"><div class="qit">${X(t.title)}</div><div class="qic">${X(t.ch)}</div></div><button class="qrm" onclick="event.stopPropagation();rmQ(${i})">×</button></div>`).join('');
}
function rmQ(i){if(i===S.i)nextT();S.q.splice(i,1);if(i<S.i)S.i--;updateQ();toast('Removed');}
function clearQ(){S.q=[];S.i=-1;if(ytR)ytp.stopVideo();S.pl=false;showPlay();stopProg();updateQ();toast('Cleared');}

document.addEventListener('keydown',e=>{
  const tag=e.target.tagName;if(tag==='INPUT'||tag==='TEXTAREA')return;
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowRight'&&ytR&&S.dur>0)ytp.seekTo(Math.min(S.dur,(ytp.getCurrentTime()||0)+10),true);
  if(e.code==='ArrowLeft'&&ytR)ytp.seekTo(Math.max(0,(ytp.getCurrentTime()||0)-10),true);
  if(e.code==='KeyN')nextT();
  if(e.code==='KeyP')prevT();
  if(e.code==='KeyS')toggleShuffle();
  if(e.code==='KeyR')toggleRepeat();
  if(e.code==='KeyL')toggleLyr();
  if(e.code==='KeyM'){const v=document.getElementById('vs');v.value=v.value>0?0:85;setVol(v.value);}
});

let ttt;
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(ttt);ttt=setTimeout(()=>e.classList.remove('show'),2000);}
function pdur(iso){if(!iso)return'';const m=iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);if(!m)return'';const h=+m[1]||0,mn=+m[2]||0,s=+m[3]||0;return h>0?`${h}:${String(mn).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${mn}:${String(s).padStart(2,'0')}`;}
function fmt(s){s=Math.floor(s);return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
function X(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
